<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تعيين كلمة المرور</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.container{background:white;border-radius:20px;padding:50px 40px;text-align:center;max-width:450px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.loading{width:50px;height:50px;border:4px solid #f3f3f3;border-top:4px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
h1{color:#333;margin-bottom:20px;font-size:28px;font-weight:700}
.message{color:#666;line-height:1.8;margin-bottom:20px;font-size:16px}
.btn{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:12px 30px;border-radius:25px;text-decoration:none;margin-top:20px;font-weight:bold}
.footer{margin-top:40px;padding-top:25px;border-top:1px solid #eee;color:#777;font-size:12px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
<div id="validBlock" style="display:none">
<div class="loading" id="loading"></div>
<h1 id="title">🔄 جاري فتح التطبيق</h1>
<p class="message" id="message">جاري توجيهك إلى التطبيق لإعادة تعيين كلمة المرور...</p>
<a id="openBtn" href="#" class="btn" style="display:none">📱 فتح التطبيق</a>
</div>

<div id="invalidBlock" style="display:none">
<h1>❌ رابط غير صالح</h1>
<p class="message">رابط إعادة التعيين غير صالح أو ناقص.</p>
</div>

<div class="footer">© تطبيق المنارة للتعليم - جميع الحقوق محفوظة</div>
</div>

<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  let tokenHash = params.get("token_hash") || "";
  const token = params.get("token") || "";
  const accessToken = params.get("access_token") || "";
  const type = params.get("type") || "recovery";
  const email = params.get("email") || "";

  // دعم روابط Supabase القديمة/المختلفة إن وصلت token بدل token_hash
  if (!tokenHash && token) tokenHash = token;
  if (!tokenHash && accessToken) tokenHash = accessToken;

  if (!tokenHash) {
    document.getElementById("invalidBlock").style.display = "block";
    return;
  }

  const appUrl =
    "courses://resetpassword?token_hash=" + encodeURIComponent(tokenHash) +
    "&type=" + encodeURIComponent(type || "recovery") +
    (email ? "&email=" + encodeURIComponent(email) : "");

  document.getElementById("validBlock").style.display = "block";
  const openBtn = document.getElementById("openBtn");
  openBtn.href = appUrl;

  function showManualButton(){
    document.getElementById("loading").style.display = "none";
    document.getElementById("title").innerHTML = "📱 افتح التطبيق";
    document.getElementById("message").innerHTML = "إذا لم يفتح التطبيق تلقائيًا، اضغط الزر التالي مرة واحدة فقط.";
    openBtn.style.display = "inline-block";
  }

  function tryOpenApp(){
    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = appUrl;
    document.body.appendChild(iframe);

    setTimeout(function(){ window.location.href = appUrl; }, 500);
    setTimeout(showManualButton, 2500);
  }

  window.addEventListener("load", tryOpenApp);
})();
</script>
</body>
</html>
