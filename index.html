<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم تفعيل الحساب</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  background: #fff;
  border-radius: 20px;
  padding: 45px 35px;
  text-align: center;
  max-width: 460px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

.icon {
  width: 95px;
  height: 95px;
  background: linear-gradient(135deg, #4CAF50, #8BC34A);
  border-radius: 50%;
  margin: 0 auto 25px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 48px;
  font-weight: bold;
}

h1 {
  color: #333;
  font-size: 30px;
  margin-bottom: 18px;
}

.message {
  color: #666;
  font-size: 17px;
  line-height: 1.8;
  margin-bottom: 15px;
}

.highlight {
  color: #4CAF50;
  font-weight: bold;
}

.footer {
  margin-top: 35px;
  padding-top: 20px;
  border-top: 1px solid #eee;
  color: #777;
  font-size: 13px;
}
</style>
</head>

<body>
<div class="container">
  <div class="icon">✓</div>

  <h1>تم تفعيل الحساب بنجاح</h1>

  <p class="message">
    <span class="highlight">مبروك!</span><br>
    تم تأكيد بريدك الإلكتروني بنجاح.
  </p>

  <p class="message">
    يمكنك الآن العودة إلى التطبيق وتسجيل الدخول باستخدام بريدك الإلكتروني وكلمة المرور.
  </p>

  <div class="footer">
    © تطبيق المنارة للتعليم - جميع الحقوق محفوظة
  </div>
</div>
</body>
</html>
