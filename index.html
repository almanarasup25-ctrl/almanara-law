<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المنارة للتعليم</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.container{background:white;border-radius:20px;padding:50px 40px;text-align:center;max-width:450px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.icon{width:90px;height:90px;background:linear-gradient(135deg,#4CAF50,#8BC34A);border-radius:50%;margin:0 auto 25px;display:flex;align-items:center;justify-content:center;color:white;font-size:42px;font-weight:bold}
h1{color:#333;margin-bottom:18px;font-size:30px}
.message{color:#666;line-height:1.8;margin-bottom:18px;font-size:17px}
.btn{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:12px 28px;border-radius:25px;text-decoration:none;margin-top:10px;font-weight:bold}
.footer{margin-top:35px;padding-top:20px;border-top:1px solid #eee;color:#777;font-size:13px}
</style>
</head>
<body>
<div class="container">
<div class="icon">✓</div>
<h1>موقع المنارة للتعليم</h1>
<p class="message">هذه الصفحة مخصصة لروابط التحقق وإعادة تعيين كلمة المرور.</p>
<a class="btn" href="privacy.html">سياسة الخصوصية</a>
<div class="footer">© تطبيق المنارة للتعليم - جميع الحقوق محفوظة</div>
</div>
</body>
</html>
